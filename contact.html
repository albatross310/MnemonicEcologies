<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Mnemonic Ecologies</title>
  <meta name="description" content="Get in touch with Mnemonic Ecologies. We want your feedback, questions, and ideas." />

  <link rel="canonical" href="https://mnemonicecologies.com/contact" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mnemonicecologies.com/contact" />
  <meta property="og:title" content="Contact | Mnemonic Ecologies" />
  <meta property="og:description" content="We want your feedback, questions, and ideas." />
  <meta property="og:image" content="https://mnemonicecologies.com/og-image.png" />
  <meta property="og:site_name" content="Mnemonic Ecologies" />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <a href="#main" class="skip-link">Skip to content</a>

  <nav aria-label="Main navigation">
    <a href="/" class="nav-logo" aria-label="Mnemonic Ecologies home">Mnemonic Ecologies</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/philosophy">Philosophy</a>
      <a href="/contact" class="active" aria-current="page">Contact</a>
    </div>
  </nav>

  <main id="main" class="prose-page contact-page">
    <h1>Contact</h1>
    <div class="page-bar" aria-hidden="true"></div>
    <p class="lead">We genuinely want to hear from you — feedback, questions, disagreements, ideas.</p>

    <form class="contact-form" action="https://formspree.io/f/mjgqyqrq" method="POST">
      <label>
        Name
        <input type="text" name="name" autocomplete="name" placeholder="Your name" required />
      </label>
      <label>
        Email
        <input type="email" name="email" autocomplete="email" placeholder="your@email.com" required />
      </label>
      <label>
        Message
        <textarea name="message" rows="5" placeholder="What's on your mind?" required></textarea>
      </label>
      <button type="submit" class="cta">Send →</button>
    </form>

    <p class="contact-alt">Or email directly: <a href="mailto:petergibson127@gmail.com">petergibson127@gmail.com</a></p>
  </main>

  <footer>
    <p>Mnemonic Ecologies &middot; <a href="/contact">get in touch</a> &middot; Built in Brisbane, Australia</p>
  </footer>

</body>
</html>
